<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Chet to Phagun — Nanakshahi Memory Game</title>

<style>

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  background:#f0ece4;
  font-family:"Segoe UI",Arial,sans-serif;
  min-height:100vh;
  display:flex;
  align-items:flex-start;
  justify-content:center;
  padding:1.5rem 1rem;
}

.container{
  width:100%;
  max-width:1200px;
}

.header{
  text-align:center;
  margin-bottom:1rem;
}

.header h1{
  font-size:32px;
  font-weight:900;
  color:#1a1a2e;
}

.header p{
  font-size:14px;
  color:#666;
  margin-top:5px;
  font-weight:500;
}

.legend{
  display:flex;
  gap:14px;
  justify-content:center;
  margin-bottom:1rem;
  flex-wrap:wrap;
}

.legend-item{
  display:flex;
  align-items:center;
  gap:6px;
  font-size:13px;
  font-weight:700;
}

.legend-dot{
  width:13px;
  height:13px;
  border-radius:50%;
  flex-shrink:0;
}

.stats{
  display:flex;
  gap:12px;
  justify-content:center;
  margin-bottom:1rem;
  flex-wrap:wrap;
}

.stat{
  background:#fff;
  border-radius:10px;
  padding:9px 20px;
  font-size:14px;
  font-weight:700;
  color:#555;
  box-shadow:0 1px 6px rgba(0,0,0,0.1);
}

.stat span{
  color:#1a1a2e;
  font-size:20px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:14px;
  margin-bottom:1.2rem;
}

.card{
  aspect-ratio:0.82;
  cursor:pointer;
  perspective:1000px;
}

.card-inner{
  width:100%;
  height:100%;
  position:relative;
  transform-style:preserve-3d;
  transition:transform 0.45s ease;
  border-radius:18px;
}

.card.flipped .card-inner,
.card.matched .card-inner{
  transform:rotateY(180deg);
}

.card-front,
.card-back{
  position:absolute;
  width:100%;
  height:100%;
  backface-visibility:hidden;
  -webkit-backface-visibility:hidden;
  border-radius:18px;
  display:flex;
  align-items:center;
  justify-content:center;
  border:3px solid rgba(0,0,0,0.15);
  box-shadow:0 5px 14px rgba(0,0,0,0.18);
}

.card-front{
  background:linear-gradient(135deg,#2C2C54,#3D3D80);
  flex-direction:column;
  gap:7px;
}

.card-front-icon{
  font-size:34px;
}

.card-front-hint{
  font-size:11px;
  font-weight:700;
  color:rgba(255,255,255,0.58);
  text-transform:uppercase;
  letter-spacing:0.1em;
}

.card-back{
  transform:rotateY(180deg);
  padding:10px;
  flex-direction:column;
  gap:8px;
  overflow:hidden;
}

/* MONTH */

.kesree{
  background:linear-gradient(145deg,#FF8C00,#E65C00);
  border-color:#C44E00;
}

.kesree .month-num{
  font-size:11px;
  font-weight:800;
  color:rgba(255,255,255,0.88);
  text-transform:uppercase;
  letter-spacing:0.1em;
  background:rgba(0,0,0,0.2);
  padding:3px 10px;
  border-radius:20px;
}

.kesree .month-name{
  font-size:30px;
  font-weight:900;
  color:#fff;
  text-align:center;
  line-height:1.1;
  text-shadow:0 2px 5px rgba(0,0,0,0.3);
}

.kesree .month-gurmukhi{
  font-size:20px;
  font-weight:700;
  color:rgba(255,255,255,0.95);
  text-align:center;
}

/* SHABAD */

.surmaee{
  background:linear-gradient(145deg,#3B5998,#1E3A6E);
  border-color:#162D57;
}

.surmaee .shabad-tag{
  font-size:9px;
  font-weight:800;
  color:rgba(255,255,255,0.72);
  text-transform:uppercase;
  letter-spacing:0.08em;
  background:rgba(255,255,255,0.15);
  padding:3px 9px;
  border-radius:20px;
  white-space:nowrap;
}

.surmaee .gurmukhi{
  font-size:19px;
  font-weight:900;
  color:#fff;
  text-align:center;
  line-height:1.55;
  text-shadow:0 1px 4px rgba(0,0,0,0.4);
}

.surmaee .roman{
  font-size:11px;
  font-weight:700;
  color:rgba(255,255,255,0.88);
  text-align:center;
  line-height:1.35;
  font-style:italic;
}

.surmaee .ang{
  font-size:9px;
  font-weight:700;
  color:rgba(255,255,255,0.55);
  text-align:center;
}

/* MATCHED */

.card.matched .card-back{
  background:linear-gradient(145deg,#56AB2F,#A8E063)!important;
  border-color:#3D8A1F!important;
  box-shadow:0 0 18px rgba(86,171,47,0.55)!important;
}

.card.matched .card-back *{
  color:#fff!important;
}

/* BUTTONS */

.btn-row{
  display:flex;
  gap:10px;
  justify-content:center;
  flex-wrap:wrap;
}

button{
  font-size:15px;
  font-weight:800;
  padding:11px 24px;
  border-radius:12px;
  border:2px solid rgba(0,0,0,0.15);
  cursor:pointer;
  font-family:inherit;
}

.btn-restart{
  background:linear-gradient(135deg,#FF8C00,#E65C00);
  color:#fff;
  border-color:#C44E00;
}

.win-banner{
  display:none;
  text-align:center;
  padding:1.6rem;
  background:linear-gradient(135deg,#56AB2F,#A8E063);
  border-radius:18px;
  margin-top:1rem;
}

.win-banner h3{
  font-size:24px;
  font-weight:900;
  color:#fff;
  margin-bottom:6px;
}

.win-banner p{
  font-size:14px;
  font-weight:600;
  color:rgba(255,255,255,0.93);
}

/* TABLET */

@media(max-width:900px){

  .grid{
    grid-template-columns:repeat(4,1fr);
  }
}

/* MOBILE */

@media(max-width:560px){

  .grid{
    grid-template-columns:repeat(3,1fr);
    gap:10px;
  }

  .card{
    aspect-ratio:0.78;
  }

  .kesree .month-name{
    font-size:24px;
  }

  .kesree .month-gurmukhi{
    font-size:17px;
  }

  .surmaee .gurmukhi{
    font-size:15px;
  }

  .surmaee .roman{
    font-size:9px;
  }
}

</style>
</head>

<body>

<div class="container">

  <div class="header">
    <h1>☬ Chet to Phagun</h1>
    <p>Match each month to its Barah Maha shabad</p>
  </div>

  <div class="legend">

    <div class="legend-item">
      <div class="legend-dot" style="background:#FF8C00;"></div>
      <span style="color:#C44E00;">Kesree — Month</span>
    </div>

    <div class="legend-item">
      <div class="legend-dot" style="background:#3B5998;"></div>
      <span style="color:#1E3A6E;">Surmaee — Shabad</span>
    </div>

  </div>

  <div class="stats">
    <div class="stat">Moves: <span id="moves">0</span></div>
    <div class="stat">Matched: <span id="matched">0</span> / 12</div>
    <div class="stat">Time: <span id="timer">0:00</span></div>
  </div>

  <div class="grid" id="grid"></div>

  <div class="btn-row">
    <button class="btn-restart" onclick="restart()">↺ New Game</button>
  </div>

  <div class="win-banner" id="winBanner">
    <h3>🎉 Waheguru! All 12 matched!</h3>
    <p id="winMsg"></p>
  </div>

</div>

<script>

const GURMUKHI = {
  "Chet":"ਚੇਤ",
  "Vaisakh":"ਵੈਸਾਖ",
  "Jeth":"ਜੇਠ",
  "Harh":"ਹਾੜ",
  "Sawan":"ਸਾਵਣ",
  "Bhadon":"ਭਾਦੋਂ",
  "Assu":"ਅੱਸੂ",
  "Katik":"ਕੱਤਕ",
  "Maghar":"ਮੰਘਿਰ",
  "Poh":"ਪੋਹ",
  "Magh":"ਮਾਘ",
  "Phagun":"ਫੱਗਣ"
};

const MONTHS = [
{
month:"Chet",
num:1,
gurmukhi:"ਚੇਤਿ ਗੋਵਿੰਦੁ ਅਰਾਧੀਐ ਹੋਵੈ ਅਨੰਦੁ ਘਣਾ ॥",
roman:"Cheti govind araadhheeai hovai anand ghanaa",
ang:"Ang 133 — Guru Arjan Dev Ji"
},
{
month:"Vaisakh",
num:2,
gurmukhi:"ਵੈਸਾਖਿ ਧੀਰਨਿ ਕਿਉ ਵਢੀਆ ਜਿਨਾ ਪ੍ਰੇਮ ਬਿਛੋਹੁ ॥",
roman:"Vaisaakh dheeran kio vadheeaa jinaa prem bichhohu",
ang:"Ang 133 — Guru Arjan Dev Ji"
},
{
month:"Jeth",
num:3,
gurmukhi:"ਜੇਠਿ ਜੁੜੰਦਾ ਲੋੜੀਐ ਜਿਸੁ ਅਗੈ ਸਭਿ ਨਿਵੰਨਿ ॥",
roman:"Jeth jurranddaa lorreeai jis agai sabh nivann",
ang:"Ang 134 — Guru Arjan Dev Ji"
},
{
month:"Harh",
num:4,
gurmukhi:"ਆਸਾੜੁ ਤਪੰਦਾ ਤਿਸੁ ਲਗੈ ਹਰਿ ਨਾਹੁ ਨ ਜਿੰਨਾ ਪਾਸਿ ॥",
roman:"Aasaarh tapandhaa tis lagai har naahu na jinna paas",
ang:"Ang 134 — Guru Arjan Dev Ji"
},
{
month:"Sawan",
num:5,
gurmukhi:"ਸਾਵਣਿ ਸਰਸੀ ਕਾਮਣੀ ਚਰਨ ਕਮਲ ਸਿਉ ਪਿਆਰੁ ॥",
roman:"Saavan sarasee kaamanee charan kamal sio piaar",
ang:"Ang 134 — Guru Arjan Dev Ji"
},
{
month:"Bhadon",
num:6,
gurmukhi:"ਭਾਦੁਇ ਭਰਮਿ ਭੁਲਾਣੀਆ ਦੂਜੈ ਲਗਾ ਹੇਤੁ ॥",
roman:"Bhaadui bharam bhulaaneeaa doojai lagaa het",
ang:"Ang 134 — Guru Arjan Dev Ji"
},
{
month:"Assu",
num:7,
gurmukhi:"ਅਸੁਨਿ ਪ੍ਰੇਮ ਉਮਾਹੜਾ ਕਿਉ ਮਿਲੀਐ ਹਰਿ ਜਾਇ ॥",
roman:"Asun prem umaahrraa kio mileeai har jaai",
ang:"Ang 135 — Guru Arjan Dev Ji"
},
{
month:"Katik",
num:8,
gurmukhi:"ਕਤਿਕਿ ਕਰਮ ਕਮਾਵਣੇ ਦੋਸੁ ਨ ਕਾਹੂ ਜੋਗੁ ॥",
roman:"Katik karam kamaavane dos na kaahoo jog",
ang:"Ang 135 — Guru Arjan Dev Ji"
},
{
month:"Maghar",
num:9,
gurmukhi:"ਮੰਘਿਰਿ ਮਾਹਿ ਸੋਹੰਦੀਆ ਹਰਿ ਪਿਰ ਸੰਗਿ ਬੈਠੜੀਆਹ ॥",
roman:"Manghir maahi sohndeeaa har pir sang baithrreeaah",
ang:"Ang 135 — Guru Arjan Dev Ji"
},
{
month:"Poh",
num:10,
gurmukhi:"ਪੋਖਿ ਤੁਹਾਰੁ ਨ ਵਿਆਪਈ ਕੰਠਿ ਮਿਲਿਆ ਹਰਿ ਨਾਹੁ ॥",
roman:"Pokh tuhaar na viaapai kanth miliyaa har naahu",
ang:"Ang 135 — Guru Arjan Dev Ji"
},
{
month:"Magh",
num:11,
gurmukhi:"ਮਾਘਿ ਮਜਨੁ ਸੰਗਿ ਸਾਧੂਆ ਧੂੜੀ ਕਰਿ ਇਸਨਾਨੁ ॥",
roman:"Maagh majan sang saadhooaa dhoorree kar isnaan",
ang:"Ang 136 — Guru Arjan Dev Ji"
},
{
month:"Phagun",
num:12,
gurmukhi:"ਫਲਗੁਣਿ ਅਨੰਦ ਉਪਾਰਜਨਾ ਹਰਿ ਸਜਣ ਪ੍ਰਗਟੇ ਆਇ ॥",
roman:"Phalgun anand upaarjanaa har sajan pragate aae",
ang:"Ang 136 — Guru Arjan Dev Ji"
}
];

let cards=[];
let flipped=[];
let matched=0;
let moves=0;
let lock=false;
let timerInterval=null;
let seconds=0;

function shuffle(arr){
  let a=[...arr];
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function buildPairs(){

  const p=[];

  MONTHS.forEach(m=>{

    p.push({...m,cardType:"month"});
    p.push({...m,cardType:"shabad"});
  });

  return shuffle(p);
}

function restart(){

  clearInterval(timerInterval);

  seconds=0;
  moves=0;
  matched=0;
  flipped=[];
  lock=false;

  document.getElementById("moves").textContent="0";
  document.getElementById("matched").textContent="0";
  document.getElementById("timer").textContent="0:00";

  document.getElementById("winBanner").style.display="none";

  cards=buildPairs();

  timerInterval=setInterval(()=>{

    seconds++;

    const m=Math.floor(seconds/60);
    const s=seconds%60;

    document.getElementById("timer").textContent =
      m + ":" + String(s).padStart(2,"0");

  },1000);

  render();
}

function render(){

  const grid=document.getElementById("grid");

  grid.innerHTML="";

  cards.forEach((c,i)=>{

    const div=document.createElement("div");

    div.className="card";

    div.onclick=()=>flip(i);

    let back="";

    if(c.cardType==="month"){

      back=`
      <div class="card-back kesree">

        <span class="month-num">
          Month ${c.num}
        </span>

        <span class="month-name">
          ${c.month}
        </span>

        <span class="month-gurmukhi">
          ${GURMUKHI[c.month]}
        </span>

      </div>`;
    }

    else{

      back=`
      <div class="card-back surmaee">

        <span class="shabad-tag">
          Barah Maha
        </span>

        <span class="gurmukhi">
          ${c.gurmukhi}
        </span>

        <span class="roman">
          ${c.roman}
        </span>

        <span class="ang">
          ${c.ang}
        </span>

      </div>`;
    }

    const icon =
      c.cardType==="month"
      ? "☽"
      : "ੴ";

    const hint =
      c.cardType==="month"
      ? "month"
      : "shabad";

    div.innerHTML=`
      <div class="card-inner">

        <div class="card-front">

          <span class="card-front-icon">
            ${icon}
          </span>

          <span class="card-front-hint">
            ${hint}
          </span>

        </div>

        ${back}

      </div>`;

    grid.appendChild(div);
  });
}

function flip(i){

  if(lock)return;

  const els=document.querySelectorAll(".card");
  const el=els[i];

  if(el.classList.contains("flipped") ||
     el.classList.contains("matched")) return;

  el.classList.add("flipped");

  flipped.push(i);

  if(flipped.length===2){

    lock=true;

    moves++;

    document.getElementById("moves").textContent=moves;

    const [a,b]=flipped;

    if(cards[a].month===cards[b].month &&
       cards[a].cardType!==cards[b].cardType){

      setTimeout(()=>{

        els[a].classList.add("matched");
        els[b].classList.add("matched");

        matched++;

        document.getElementById("matched").textContent=matched;

        flipped=[];

        lock=false;

        if(matched===12){

          clearInterval(timerInterval);

          const t=document.getElementById("timer").textContent;

          document.getElementById("winMsg").textContent =
            `Completed in ${moves} moves and ${t}.`;

          document.getElementById("winBanner").style.display="block";
        }

      },600);
    }

    else{

      setTimeout(()=>{

        els[a].classList.remove("flipped");
        els[b].classList.remove("flipped");

        flipped=[];

        lock=false;

      },1000);
    }
  }
}

restart();

</script>

</body>
</html>
