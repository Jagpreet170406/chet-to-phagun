<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Nanakshahi Memory Game</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #f5f5f5; font-family: 'Segoe UI', Arial, sans-serif; padding: 1rem 0.5rem; }

  .header { text-align: center; margin-bottom: 0.7rem; }
  .header h1 { font-size: 22px; font-weight: 800; color: #1a1a2e; }
  .header p { font-size: 12px; color: #555; margin-top: 3px; }

  .legend { display: flex; gap: 10px; justify-content: center; margin-bottom: 0.6rem; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 4px; font-size: 10.5px; font-weight: 700; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  .stats { display: flex; gap: 8px; justify-content: center; margin-bottom: 0.65rem; flex-wrap: wrap; }
  .stat { background: #fff; border-radius: 8px; padding: 5px 13px; font-size: 11px; font-weight: 700; color: #555; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
  .stat span { color: #1a1a2e; font-size: 14px; }

  .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; margin-bottom: 0.8rem; }

  .card { aspect-ratio: 0.72; cursor: pointer; perspective: 800px; }
  .card-inner { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.45s ease; border-radius: 12px; }
  .card.flipped .card-inner, .card.matched .card-inner { transform: rotateY(180deg); }

  .card-front, .card-back {
    position: absolute; width: 100%; height: 100%;
    backface-visibility: hidden; -webkit-backface-visibility: hidden;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    border: 3px solid rgba(0,0,0,0.12);
    box-shadow: 0 3px 10px rgba(0,0,0,0.15);
  }
  .card-front {
    background: linear-gradient(135deg, #2C2C54, #3D3D80);
    flex-direction: column; gap: 4px;
  }
  .card-front-icon { font-size: 22px; }
  .card-front-hint { font-size: 9px; font-weight: 700; color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 0.08em; }
  .card-back { transform: rotateY(180deg); padding: 6px; flex-direction: column; gap: 4px; overflow: hidden; }

  /* KESREE — month (orange) */
  .kesree { background: linear-gradient(145deg, #FF8C00, #E65C00); border-color: #C44E00; }
  .kesree .month-num { font-size: 9px; font-weight: 800; color: rgba(255,255,255,0.85); text-transform: uppercase; letter-spacing: 0.1em; background: rgba(0,0,0,0.2); padding: 2px 7px; border-radius: 20px; }
  .kesree .month-name { font-size: 20px; font-weight: 900; color: #fff; text-align: center; line-height: 1.1; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }
  .kesree .month-gurmukhi { font-size: 14px; font-weight: 700; color: rgba(255,255,255,0.9); text-align: center; }

  /* SURMAEE — shabad (dark blue) */
  .surmaee { background: linear-gradient(145deg, #3B5998, #1E3A6E); border-color: #162D57; }
  .surmaee .shabad-tag { font-size: 7.5px; font-weight: 800; color: rgba(255,255,255,0.7); text-transform: uppercase; letter-spacing: 0.08em; background: rgba(255,255,255,0.15); padding: 2px 6px; border-radius: 20px; white-space: nowrap; flex-shrink: 0; }
  .surmaee .gurmukhi { font-size: 16px; font-weight: 900; color: #fff; text-align: center; line-height: 1.35; text-shadow: 0 1px 4px rgba(0,0,0,0.4); }
  .surmaee .roman { font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.85); text-align: center; line-height: 1.3; font-style: italic; }
  .surmaee .ang { font-size: 8px; font-weight: 700; color: rgba(255,255,255,0.55); text-align: center; }

  /* BASANTEE — picture (yellow) */
  .basantee { background: linear-gradient(145deg, #FFD700, #FFA500); border-color: #CC8400; padding: 5px !important; }
  .basantee .pic-tag { font-size: 7.5px; font-weight: 800; color: rgba(0,0,0,0.6); text-transform: uppercase; letter-spacing: 0.08em; background: rgba(255,255,255,0.5); padding: 2px 6px; border-radius: 20px; flex-shrink: 0; }
  .basantee img { width: 100%; flex: 1; object-fit: cover; border-radius: 7px; min-height: 0; border: 2px solid rgba(255,255,255,0.6); }
  .basantee .pic-caption { font-size: 8.5px; font-weight: 800; color: rgba(0,0,0,0.75); text-align: center; line-height: 1.25; }

  /* matched */
  .card.matched .card-back { background: linear-gradient(145deg, #56AB2F, #A8E063) !important; border-color: #3D8A1F !important; box-shadow: 0 0 14px rgba(86,171,47,0.5) !important; }
  .card.matched .card-back * { color: #fff !important; text-shadow: 0 1px 3px rgba(0,0,0,0.3) !important; }

  .btn-row { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
  button { font-size: 13px; font-weight: 700; padding: 8px 18px; border-radius: 10px; border: 2px solid rgba(0,0,0,0.15); cursor: pointer; font-family: inherit; }
  .btn-restart { background: linear-gradient(135deg, #FF8C00, #E65C00); color: #fff; border-color: #C44E00; }
  .btn-restart:hover { opacity: 0.9; }
  .btn-info { background: #EEEDFE; color: #3C3489; border-color: #AFA9EC; }
  .btn-info:hover { background: #CECBF6; }

  .win-banner { display: none; text-align: center; padding: 1.25rem; background: linear-gradient(135deg, #56AB2F, #A8E063); border-radius: 14px; margin-top: 0.8rem; box-shadow: 0 4px 16px rgba(86,171,47,0.3); }
  .win-banner h3 { font-size: 20px; font-weight: 900; color: #fff; margin-bottom: 5px; text-shadow: 0 2px 4px rgba(0,0,0,0.2); }
  .win-banner p { font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.92); }
</style>
</head>
<body>

<div class="header">
  <h1>Nanakshahi Memory Game</h1>
  <p>Match the month to its shabad or picture clue</p>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#FF8C00;"></div><span style="color:#E65C00;">Kesree — Month</span></div>
  <div class="legend-item"><div class="legend-dot" style="background:#3B5998;"></div><span style="color:#1E3A6E;">Surmaee — Shabad</span></div>
  <div class="legend-item"><div class="legend-dot" style="background:#FFD700;"></div><span style="color:#CC8400;">Basantee — Picture</span></div>
</div>

<div class="stats">
  <div class="stat">Moves: <span id="moves">0</span></div>
  <div class="stat">Matched: <span id="matched">0</span> / 12</div>
  <div class="stat">Time: <span id="timer">0:00</span></div>
</div>

<div class="grid" id="grid"></div>

<div class="btn-row">
  <button class="btn-restart" onclick="restart()">↺ New Game</button>
</div>

<div class="win-banner" id="winBanner">
  <h3>🎉 Waheguru! All 12 matched!</h3>
  <p id="winMsg"></p>
</div>

<script>
const GURMUKHI = {
  'Chet':'ਚੇਤ','Vaisakh':'ਵੈਸਾਖ','Jeth':'ਜੇਠ','Harh':'ਹਾੜ',
  'Sawan':'ਸਾਵਣ','Bhadon':'ਭਾਦੋਂ','Assu':'ਅੱਸੂ','Katik':'ਕੱਤਕ',
  'Maghar':'ਮੱਘਰ','Poh':'ਪੋਹ','Magh':'ਮਾਘ','Phagun':'ਫੱਗਣ'
};

const MONTHS = [
  {
    month:'Chet', num:1, type:'shabad',
    gurmukhi:'ਚੇਤਿ ਗੋਵਿੰਦੁ ਅਰਾਧੀਐ',
    roman:'Cheti govind araadhheeai',
    ang:'Ang 133 — Guru Arjan Dev Ji'
  },
  {
    month:'Vaisakh', num:2, type:'picture',
    imgUrl:'https://upload.wikimedia.org/wikipedia/commons/thumb/5/5e/Vaisakhi_at_Harmandir_Sahib.jpg/480px-Vaisakhi_at_Harmandir_Sahib.jpg',
    imgFallback:'https://upload.wikimedia.org/wikipedia/commons/thumb/b/b3/Amritsar_Golden_Temple_2006.jpg/480px-Amritsar_Golden_Temple_2006.jpg',
    caption:'Vaisakhi',
    desc:'Founding of the Khalsa, 1699'
  },
  {
    month:'Jeth', num:3, type:'shabad',
    gurmukhi:'ਹਰਿ ਜੇਠਿ ਜੁੜੰਦਾ ਲੋੜੀਐ',
    roman:'Har jethi jurranddaa lorreeai',
    ang:'Ang 134 — Guru Arjan Dev Ji'
  },
  {
    month:'Harh', num:4, type:'shabad',
    gurmukhi:'ਆਸਾੜੁ ਤਪੰਦਾ ਤਿਸੁ ਲਗੈ',
    roman:'Aasaarh tapandhaa tis lagai',
    ang:'Ang 134 — Guru Arjan Dev Ji'
  },
  {
    month:'Sawan', num:5, type:'shabad',
    gurmukhi:'ਸਾਵਣਿ ਸਰਸੀ ਕਾਮਣੀ',
    roman:'Saavan sarasee kaamanee',
    ang:'Ang 134 — Guru Arjan Dev Ji'
  },
  {
    month:'Bhadon', num:6, type:'shabad',
    gurmukhi:'ਭਾਦੁਇ ਭਰਮਿ ਭੁਲਾਣੀਆ',
    roman:'Bhaadui bharam bhulaaneeaa',
    ang:'Ang 134 — Guru Arjan Dev Ji'
  },
  {
    month:'Assu', num:7, type:'shabad',
    gurmukhi:'ਅਸੁ ਆਉ ਪਿਆਰਿਆ',
    roman:'Asu aao piaaariaa',
    ang:'Ang 135 — Guru Arjan Dev Ji'
  },
  {
    month:'Katik', num:8, type:'picture',
    imgUrl:'https://upload.wikimedia.org/wikipedia/commons/thumb/9/92/Harmandir_Sahib_at_Diwali.jpg/480px-Harmandir_Sahib_at_Diwali.jpg',
    imgFallback:'https://upload.wikimedia.org/wikipedia/commons/thumb/b/b3/Amritsar_Golden_Temple_2006.jpg/480px-Amritsar_Golden_Temple_2006.jpg',
    caption:'Bandi Chhor Divas',
    desc:'Guru Hargobind Ji freed 52 kings, Katik'
  },
  {
    month:'Maghar', num:9, type:'shabad',
    gurmukhi:'ਮੰਘਿਰਿ ਮਾਹੁ ਭਲਾ',
    roman:'Manghir maahu bhalaa',
    ang:'Ang 135 — Guru Arjan Dev Ji'
  },
  {
    month:'Poh', num:10, type:'picture',
    imgUrl:'https://upload.wikimedia.org/wikipedia/commons/thumb/0/06/Chaar_Sahibzaade.jpg/480px-Chaar_Sahibzaade.jpg',
    imgFallback:'https://upload.wikimedia.org/wikipedia/commons/thumb/8/87/Patna_Sahib.jpg/320px-Patna_Sahib.jpg',
    caption:'Chaar Sahibzaade',
    desc:"Shaheedi of Guru Gobind Singh Ji's sons, Poh"
  },
  {
    month:'Magh', num:11, type:'shabad',
    gurmukhi:'ਮਾਘਿ ਪੁੰਨੁ ਦਾਨੁ ਕਰਹੁ',
    roman:'Maagh pun daan karahu',
    ang:'Ang 136 — Guru Arjan Dev Ji'
  },
  {
    month:'Phagun', num:12, type:'shabad',
    gurmukhi:'ਫਲਗੁਣਿ ਮਨਿ ਰਹਾਉ ਨ ਹੋਇ',
    roman:'Phalgun man rahaao na hoi',
    ang:'Ang 136 — Guru Arjan Dev Ji'
  },
];

let cards=[], flipped=[], matched=0, moves=0, lock=false;
let timerInterval=null, seconds=0;

function shuffle(arr){
  let a=[...arr];
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function buildPairs(){
  const pairs=[];
  MONTHS.forEach(m=>{
    pairs.push({...m,cardType:'month'});
    pairs.push({...m,cardType:'clue'});
  });
  return shuffle(pairs);
}

function restart(){
  clearInterval(timerInterval);
  seconds=0; moves=0; matched=0; flipped=[]; lock=false;
  document.getElementById('moves').textContent='0';
  document.getElementById('matched').textContent='0';
  document.getElementById('timer').textContent='0:00';
  document.getElementById('winBanner').style.display='none';
  cards=buildPairs();
  timerInterval=setInterval(()=>{
    seconds++;
    const m=Math.floor(seconds/60), s=seconds%60;
    document.getElementById('timer').textContent=m+':'+String(s).padStart(2,'0');
  },1000);
  render();
}

function render(){
  const grid=document.getElementById('grid');
  grid.innerHTML='';
  cards.forEach((c,i)=>{
    const div=document.createElement('div');
    div.className='card';
    div.onclick=()=>flip(i);

    let backHTML='';

    if(c.cardType==='month'){
      backHTML=`<div class="card-back kesree">
        <span class="month-num">Month ${c.num}</span>
        <span class="month-name">${c.month}</span>
        <span class="month-gurmukhi">${GURMUKHI[c.month]||''}</span>
      </div>`;
    } else {
      if(c.type==='shabad'){
        backHTML=`<div class="card-back surmaee">
          <span class="shabad-tag">Barahmah Majh · ${c.ang.split('—')[0].trim()}</span>
          <span class="gurmukhi">${c.gurmukhi}</span>
          <span class="roman">${c.roman}</span>
          <span class="ang">${c.ang}</span>
        </div>`;
      } else {
        backHTML=`<div class="card-back basantee">
          <span class="pic-tag">📸 Picture Clue</span>
          <img src="${c.imgUrl}" alt="${c.caption}" onerror="this.src='${c.imgFallback}'"/>
          <span class="pic-caption">${c.caption}<br><span style="font-weight:600;font-size:7px;opacity:0.8;">${c.desc}</span></span>
        </div>`;
      }
    }

    const frontIcon = c.cardType==='month' ? '☽' : c.type==='shabad' ? 'ੴ' : '🖼';
    const frontHint = c.cardType==='month' ? 'month' : c.type==='shabad' ? 'shabad' : 'picture';

    div.innerHTML=`<div class="card-inner">
      <div class="card-front">
        <span class="card-front-icon">${frontIcon}</span>
        <span class="card-front-hint">${frontHint}</span>
      </div>
      ${backHTML}
    </div>`;
    grid.appendChild(div);
  });
}

function flip(i){
  if(lock)return;
  const els=document.querySelectorAll('.card');
  const el=els[i];
  if(el.classList.contains('flipped')||el.classList.contains('matched'))return;
  el.classList.add('flipped');
  flipped.push(i);

  if(flipped.length===2){
    lock=true;
    moves++;
    document.getElementById('moves').textContent=moves;
    const [a,b]=flipped;
    if(cards[a].month===cards[b].month && cards[a].cardType!==cards[b].cardType){
      setTimeout(()=>{
        els[a].classList.add('matched');
        els[b].classList.add('matched');
        matched++;
        document.getElementById('matched').textContent=matched;
        flipped=[]; lock=false;
        if(matched===12){
          clearInterval(timerInterval);
          const t=document.getElementById('timer').textContent;
          document.getElementById('winMsg').textContent=`Completed in ${moves} moves and ${t}. Waheguru Ji Ka Khalsa, Waheguru Ji Ki Fateh!`;
          document.getElementById('winBanner').style.display='block';
        }
      },600);
    } else {
      setTimeout(()=>{
        els[a].classList.remove('flipped');
        els[b].classList.remove('flipped');
        flipped=[]; lock=false;
      },1000);
    }
  }
}

restart();
</script>
</body>
</html>
